{% extends "base.html" %}

{% block title %}
ویرایش پروفایل
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm border-0">

            <div class="card-body p-4">

                <h2 class="mb-4">
                    ویرایش پروفایل
                </h2>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            شماره تلفن
                        </label>

                        {{ form.phone }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            آدرس
                        </label>

                        {{ form.address }}

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        ذخیره تغییرات
                    </button>

                    <a
                        href="{% url 'profile' %}"
                        class="btn btn-outline-secondary"
                    >
                        بازگشت
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
