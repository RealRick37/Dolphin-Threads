{% extends "base.html" %}

{% block title %}
ورود
{% endblock %}

{% block content %}

<div class="row justify-content-center">


<div class="col-md-5">

    <div class="card auth-card shadow-lg border-0">

        <div class="card-body p-4">

            <div class="text-center mb-4">

                <h2 class="fw-bold">
                    ورود
                </h2>

                <p class="text-muted">
                    خوش برگشتی
                </p>

            </div>

            {% if form.non_field_errors %}

                <div class="alert alert-danger">

                    {{ form.non_field_errors }}

                </div>

            {% endif %}

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        نام کاربری
                    </label>

                    {{ form.username }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        رمز عبور
                    </label>

                    <div class="position-relative">

                        {{ form.password }}
                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100"
                >
                    ورود
                </button>

            </form>

            <hr>

            <div class="text-center">

                حساب ندارید؟

                <a
                    href="{% url 'register' %}"
                    class="text-decoration-none fw-bold"
                >
                    ثبت نام
                </a>

            </div>

        </div>

    </div>

</div>


</div>

<script>

document
.getElementById("id_username")
?.classList.add(
    "form-control"
);

document
.getElementById("id_password")
?.classList.add(
    "form-control"
);


</script>

{% endblock %}
